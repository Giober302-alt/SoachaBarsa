<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha del alumno — Barsa Soacha Academy</title>
  <link rel="icon" type="image/svg+xml" href="./logo-barsa.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.12.4/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./responsive.css">
  <style>
    body { background: var(--bg-app); }
    .detail-wrap { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }
    .detail-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .dtabs { display:flex; gap:6px; overflow-x:auto; margin-bottom:18px; padding-bottom:4px; }
    .dtab-btn {
      background:none; border:1.5px solid var(--border-color); color:var(--text-secondary);
      padding:8px 16px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer;
      white-space:nowrap; transition:all .15s;
    }
    .dtab-btn.active { background:var(--color-primary); border-color:var(--color-primary); color:#fff; }
    .dtab-panel { display:none; }
  </style>
</head>
<body>

<div class="detail-wrap">
  <div class="detail-header">
    <a href="./alumnos.html" id="backLink" class="btn-outline-bara" style="padding:8px 12px"><i class="fas fa-arrow-left"></i></a>
    <h1 class="greeting-text" style="margin:0">Ficha del alumno</h1>
  </div>

  <div id="errorBox" class="empty-widget" style="display:none;color:#dc3545"></div>

  <div id="detailRoot" style="display:none">
    <div class="dtabs">
      <button class="dtab-btn active" data-tab="general">General</button>
      <button class="dtab-btn" data-tab="medical">Médica</button>
      <button class="dtab-btn" data-tab="documents">Documentos</button>
      <button class="dtab-btn" data-tab="photos">Fotos</button>
      <button class="dtab-btn" data-tab="performance">Rendimiento</button>
      <button class="dtab-btn" data-tab="payments">Pagos</button>
      <button class="dtab-btn" data-tab="contact">Contacto</button>
    </div>

    <div class="dtab-panel" id="tab-general" style="display:block"></div>
    <div class="dtab-panel" id="tab-medical"></div>
    <div class="dtab-panel" id="tab-documents"></div>
    <div class="dtab-panel" id="tab-photos"></div>
    <div class="dtab-panel" id="tab-performance"></div>
    <div class="dtab-panel" id="tab-payments"></div>
    <div class="dtab-panel" id="tab-contact"></div>
  </div>
</div>

<div id="globalLoader" role="status" aria-live="polite">
  <div class="loader-ball"></div>
  <p id="loaderMessage">Cargando…</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.12.4/sweetalert2.all.min.js"></script>
<script type="module">
  import './alumno-detalle.js';
</script>

</body>
</html>
