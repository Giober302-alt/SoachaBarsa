<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Padres — Barsa Soacha Academy</title>
  <link rel="icon" type="image/svg+xml" href="./logo-barsa.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./responsive.css">
  <style>
    body { background: var(--bg-app); }
    .parent-wrap { max-width: 760px; margin: 0 auto; padding: 24px 20px 60px; }
    .parent-header { display:flex; align-items:center; justify-content:space-between; padding:16px 0 24px; gap:12px; flex-wrap:wrap; }
    .parent-brand { display:flex; align-items:center; gap:10px; }
    .parent-brand img { width:36px; height:36px; }
    .parent-brand-name { font-family:var(--font-display); font-size:18px; letter-spacing:1px; color:var(--text-primary); }
    .parent-section-title { font-size:15px; font-weight:700; margin:28px 0 12px; color:var(--text-primary); }
  </style>
</head>
<body>

<div class="parent-wrap">
  <div class="parent-header">
    <div class="parent-brand">
      <img src="./logo-barsa.png" onerror="this.onerror=null;this.src=&#39;./logo-barsa.svg&#39;" alt="Barsa Soacha">
      <div>
        <div class="parent-brand-name">BARSA SOACHA</div>
        <p style="font-size:11px;color:var(--text-muted)">Portal de Padres</p>
      </div>
    </div>
    <a href="./politicas.html" class="btn-outline-bara"><i class="fas fa-file-shield"></i></a>
    <a href="#" id="logoutLink" class="btn-outline-bara"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
  </div>

  <h1 class="greeting-text" id="parentGreeting">Bienvenido 👋</h1>

  <p class="parent-section-title"><i class="fas fa-bell"></i> Notificaciones</p>
  <div class="card-bara" style="padding:16px 20px"><div id="notifBell"><div class="skeleton-row"><div class="sk-circle"></div><div class="sk-text"><div class="sk-line w-100"></div></div></div></div></div>

  <p class="parent-section-title"><i class="fas fa-calendar-alt"></i> Próximos entrenamientos</p>
  <div class="card-bara" style="padding:8px 20px"><div id="parentAgenda"><div class="skeleton-row"><div class="sk-circle"></div><div class="sk-text"><div class="sk-line w-60"></div></div></div></div></div>

  <div id="noChildren" class="empty-widget" style="display:none">
    <i class="fas fa-user-friends"></i>
    <p>No encontramos alumnos vinculados a tu correo. Pídele al administrador que agregue tu correo al perfil de tu hijo(a) en "Alumnos".</p>
  </div>

  <p class="parent-section-title"><i class="fas fa-child"></i> Mis hijos</p>
  <div id="childrenTabs"><div class="skeleton-card"></div></div>

  <p class="parent-section-title"><i class="fas fa-trophy"></i> Torneos</p>
  <div id="parentTournaments"><div class="skeleton-card"></div></div>

  <p class="parent-section-title"><i class="fas fa-bullhorn"></i> Comunicados</p>
  <div class="card-bara" style="padding:20px">
    <div id="parentAnnouncements"><div class="skeleton-row"><div class="sk-circle"></div><div class="sk-text"><div class="sk-line w-100"></div><div class="sk-line w-50"></div></div></div></div>
  </div>
</div>

<script type="module">
  import './portal-padres.js';
</script>

</body>
</html>
